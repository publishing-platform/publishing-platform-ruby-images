name: Build and push images

on:
  workflow_dispatch:
    inputs:
      gitRef:
        description: Commit, tag or branch name to deploy
        required: true
        type: string
        default: main
      noPushToRegistry:
        description: Build only, skip pushing to registry
        required: true
        type: boolean
        default: false
  # push:
  #   branches:
  #     - main
  # schedule:
  #   - cron: '0 3 * * *'

jobs:
  build_and_push:
    name: Build ruby_${{ matrix.version }} images and push to GHCR
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        version: ['3_2', '3_3', '3_4', '4_0']
    permissions:
      packages: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.gitRef }}
          show-progress: false
          token: ${{ secrets.PUBLISHING_PLATFORM_CI_GITHUB_API_TOKEN }}
      - name: Build images (without pushing to registry)
        if: ${{ inputs.noPushToRegistry }}
        env:
          DRY_RUN: "1"
        run: ./build.sh ${{ matrix.version }}
      - name: Build and push images
        if: ${{ !inputs.noPushToRegistry }}
        run: ./build.sh ${{ matrix.version }}  